name: Python Tests

on:
  push:
    branches: [feature/**, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r python/requirements.txt
      - run: cd python && python -m pytest test_main.py -v